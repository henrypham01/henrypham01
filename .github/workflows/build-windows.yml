name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          echo "DATABASE_URL=file:./prisma/dev.db" > .env
          echo "JWT_SECRET=thu-phap-cosmetic-dev-secret-change-in-production-aBcDeFgHiJkLmNoPqRsTuVwXyZ123456" >> .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Setup database
        run: |
          npm run db:push
          npm run db:seed
          npm run db:seed:users

      - name: Build Next.js app
        run: npm run db:template && npm run build

      - name: Copy node_modules to standalone
        shell: powershell
        run: |
          if (Test-Path ".\.next\standalone\node_modules") {
            Remove-Item ".\.next\standalone\node_modules" -Recurse -Force
          }
          Copy-Item -Path ".\node_modules" -Destination ".\.next\standalone\node_modules" -Recurse -Force

      - name: Build Windows installer
        run: npx electron-builder --win --x64 --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/KioViet*.exe
          retention-days: 30
